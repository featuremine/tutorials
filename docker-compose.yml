version: '3'
services:
 elasticsearch1:
  image: docker.elastic.co/elasticsearch/elasticsearch:8.5.3
  container_name: elasticsearch1
  environment:
   - "discovery.type=single-node"
   - "ES_JAVA_OPTS=-Xms1g -Xmx1g" 
  volumes:
   - esdata1:/usr/share/elasticsearch/data:rw
   - escnfg1:/usr/share/elasticsearch/config:rw
  ports:
   - 9200:9200
  networks:
   - elk
  restart: unless-stopped
 kibana1:
  depends_on:
  - elasticsearch1
  image: docker.elastic.co/kibana/kibana:8.5.3
  container_name: kibana1
  networks:
   - elk
  ports:
   - 5601:5601
  restart: unless-stopped
  volumes:
   - kicnfg1:/usr/share/kibana/config:rw
volumes:
 esdata1:
  driver: local
 escnfg1:
  driver: local
 kicnfg1:
  driver: local
networks:
 elk: